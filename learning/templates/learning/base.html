{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Java Learning{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'learning/css/base.css' %}">
  {% block head %}{% endblock %}
</head>
<body>
<body>
  <div class="cursor-glow"></div>
  <canvas id="cursorParticles"></canvas>
  <div class="bg-glow"></div>
  <header class="topbar">
    <div class="logo">
      <span class="logo-icon">☕</span>
      <span class="logo-text">Java Learning</span> 
    </div>

    <nav class="nav">
  <a href="{% url 'home' %}" class="nav-link"> <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="30" height="30" x="0" y="0" viewBox="0 0 24 24" style="enable-background:new 0 0 512 512" xml:space="preserve" class=""><g><path d="m23.121 9.069-7.585-7.586a5.008 5.008 0 0 0-7.072 0L.879 9.069A2.978 2.978 0 0 0 0 11.19v9.817a3 3 0 0 0 3 3h18a3 3 0 0 0 3-3V11.19a2.978 2.978 0 0 0-.879-2.121ZM15 22.007H9v-3.934a3 3 0 0 1 6 0Zm7-1a1 1 0 0 1-1 1h-4v-3.934a5 5 0 0 0-10 0v3.934H3a1 1 0 0 1-1-1V11.19a1.008 1.008 0 0 1 .293-.707L9.878 2.9a3.008 3.008 0 0 1 4.244 0l7.585 7.586a1.008 1.008 0 0 1 .293.704Z" fill="#ffffff" opacity="1" data-original="#000000" class=""></path></g></svg> Главная</a>
  <a href="{% url 'lessons_list' %}" class="nav-link"> <img src="../../static/learning/favicon/menu-food.svg" alt=""> Уроки</a>
  <a href="{% url 'editor' %}" class="nav-link"><img src="../../static/learning/favicon/Без названия.png" alt=""> Редактор</a>
  <a href="{% url 'module_list' %}" class="nav-link"><img src="../../static/learning/favicon/cells.png" alt=""> Модули</a>
  

  {% if user.is_authenticated %}
    <form method="post" action="{% url 'logout' %}" style="display:inline;">
      {% csrf_token %}
      <button type="submit" class="nav-link logout-btn">
        Выйти
      </button>
    </form>
  {% else %}
    <a href="{% url 'login' %}" class="nav-link">Войти</a>
    <a href="{% url 'register' %}" class="nav-link">Регистрация</a>
  {% endif %}
</nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'learning/js/anim.js' %}"></script>
  <script>
 window.IS_AUTH = {{ user.is_authenticated|yesno:"true,false" }};
 </script>
  <script src="{% static 'learning/js/base.js' %}"></script>  
  <script src="https://unpkg.com/lucide@latest"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) {
      lucide.createIcons();
    }
  });
</script>

  {% block scripts %}{% endblock %}
  
</body>
</html>
